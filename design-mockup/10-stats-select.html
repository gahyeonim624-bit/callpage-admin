<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>전환분석</title>
<link rel="stylesheet" href="css/common.css">

<body data-toplevel="1" data-no-back="1">

<header class="topbar">
    <div class="topbar__lead">
        <button type="button" class="topbar__btn topbar__btn--back" id="btnBack" aria-label="뒤로가기">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none" aria-hidden="true">
                <path d="M9 1L1 9L9 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <a class="topbar__logo" href="#" aria-label="홈으로">
            <img src="images/callpage-web-logo.png" alt="CallPage">
        </a>
    </div>
    <div class="topbar__title">전환분석</div>
    <div class="topbar__trail">
        <div class="topbar__mode" id="callModeToggle" data-active="-1">
            <span class="topbar__mode-slider" aria-hidden="true"></span>
            <button type="button" class="topbar__mode-btn" aria-label="자동 응대" data-mode="-1">자동응대</button>
            <button type="button" class="topbar__mode-btn" aria-label="바로 연결" data-mode="0">바로연결</button>
        </div>
    </div>
</header>

<main class="page">

    <!-- 페이지 헤더 -->
    <section class="section">
        <div class="conv-header">
            <div class="conv-header__left">
                <h1 class="conv-header__title">전환 분석</h1>
            </div>
            <button type="button" class="conv-header__refresh" id="btnRefresh" aria-label="새로고침">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M1 4v6h6" stroke="currentColor" stroke-width="2"
                          stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M3.51 15a9 9 0 1 0 .49-4.5" stroke="currentColor" stroke-width="2"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <p class="conv-header__desc">
            아래 등록된 콜페이지 목록 중 분석을 원하시는<br/>콜페이지를 선택해 주세요.
        </p>
    </section>

    <!-- 광고 목록 -->
    <section class="section conv-list-section">
        <ul class="conv-list">
            <li class="conv-list__item" data-ad-seq="1">
                <label class="conv-check">
                    <input class="conv-check__input" type="checkbox" value="1" checked />
                    <span class="conv-check__box" aria-hidden="true">
                        <svg class="conv-check__icon" viewBox="0 0 14 11" fill="none">
                            <path d="M1 5.5L5 9.5L13 1" stroke="white" stroke-width="2"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <span class="conv-check__label">강남구 부동산 매매 상담 · 네이버 부동산</span>
                </label>
            </li>
            <li class="conv-list__item" data-ad-seq="2">
                <label class="conv-check">
                    <input class="conv-check__input" type="checkbox" value="2" checked />
                    <span class="conv-check__box" aria-hidden="true">
                        <svg class="conv-check__icon" viewBox="0 0 14 11" fill="none">
                            <path d="M1 5.5L5 9.5L13 1" stroke="white" stroke-width="2"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <span class="conv-check__label">강남구 부동산 매매 상담 · 인스타그램</span>
                </label>
            </li>
            <li class="conv-list__item" data-ad-seq="3">
                <label class="conv-check">
                    <input class="conv-check__input" type="checkbox" value="3" />
                    <span class="conv-check__box" aria-hidden="true">
                        <svg class="conv-check__icon" viewBox="0 0 14 11" fill="none">
                            <path d="M1 5.5L5 9.5L13 1" stroke="white" stroke-width="2"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <span class="conv-check__label">강남구 부동산 매매 상담 · 유튜브</span>
                </label>
            </li>
            <li class="conv-list__item" data-ad-seq="4">
                <label class="conv-check">
                    <input class="conv-check__input" type="checkbox" value="4" />
                    <span class="conv-check__box" aria-hidden="true">
                        <svg class="conv-check__icon" viewBox="0 0 14 11" fill="none">
                            <path d="M1 5.5L5 9.5L13 1" stroke="white" stroke-width="2"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <span class="conv-check__label">인테리어 무료 견적 이벤트 · 카카오 광고</span>
                </label>
            </li>
            <li class="conv-list__item" data-ad-seq="5">
                <label class="conv-check">
                    <input class="conv-check__input" type="checkbox" value="5" />
                    <span class="conv-check__box" aria-hidden="true">
                        <svg class="conv-check__icon" viewBox="0 0 14 11" fill="none">
                            <path d="M1 5.5L5 9.5L13 1" stroke="white" stroke-width="2"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <span class="conv-check__label">여름 헬스 프로모션 PT 상담 · 구글 광고</span>
                </label>
            </li>
        </ul>

        <!-- 최대 선택 안내 -->
        <p class="conv-limit-msg hidden" id="limitMsg">최대 5개까지 선택할 수 있습니다.</p>
    </section>

    <!-- 선택 버튼 -->
    <div class="conv-action" id="convAction">
        <p class="conv-action__msg" id="selectMsg">선택하신 광고를 비교합니다.</p>
        <button type="button" class="btn conv-action__btn" id="btnSelect">
            선택
            <span class="conv-action__count" id="selectCount">(2/5)</span>
        </button>
    </div>

</main>
