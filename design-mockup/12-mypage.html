<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>마이페이지</title>
<link rel="stylesheet" href="css/common.css">
<style>
    /* ── 설정 행 ─────────────────────────────────────── */
    .settings-card {
        background: var(--card);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        overflow: hidden;
    }
    .settings-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px;
        border-bottom: 1px solid var(--line-light);
    }
    .settings-row:last-child { border-bottom: none; }

    .settings-row__icon {
        width: 40px;
        height: 40px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--primary-light);
        border-radius: var(--radius-md);
        color: var(--primary);
    }
    .settings-row__icon svg { width: 20px; height: 20px; display: block; }
    .settings-row__icon--warn { background: var(--warning-light); color: var(--warning); }
    .settings-row__icon--neutral { background: var(--line-light); color: var(--sub-text); }

    .settings-row__info {
        flex: 1;
        min-width: 0;
    }
    .settings-row__label {
        font-size: var(--fs-base);
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
    }
    .settings-row__desc {
        font-size: var(--fs-xs);
        color: var(--muted);
        margin-top: 2px;
        line-height: 1.4;
    }
    .settings-row__right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
    }

    /* 상태 점 뱃지 */
    .dot-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: var(--fs-xs);
        font-weight: 600;
        color: var(--muted);
    }
    .dot-badge__dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--line);
        flex-shrink: 0;
    }
    .dot-badge--on  .dot-badge__dot { background: var(--success); }
    .dot-badge--on  { color: var(--success); }
    .dot-badge--off .dot-badge__dot { background: var(--danger); }
    .dot-badge--off { color: var(--danger); }

    /* 작은 아이콘 버튼 (설정 이동) */
    .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        background: var(--line-light);
        border-radius: var(--radius-sm);
        color: var(--sub-text);
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        flex-shrink: 0;
    }
    .icon-btn:active { background: var(--line); color: var(--text); }
    .icon-btn svg { width: 18px; height: 18px; display: block; }

    /* 모크업에서는 앱 설정 섹션을 강제 노출 */
    .app-only { display: block; }
    .android-only { display: flex; }
</style>
</head>
<body data-toplevel="1" data-no-back="1">

<header class="topbar">
    <div class="topbar__lead">
        <button type="button" class="topbar__btn topbar__btn--back" id="btnBack" aria-label="뒤로가기">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none" aria-hidden="true">
                <path d="M9 1L1 9L9 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <a class="topbar__logo" href="#" aria-label="홈으로">
            <img src="images/callpage-web-logo.png" alt="CallPage">
        </a>
    </div>
    <div class="topbar__title">마이페이지</div>
    <div class="topbar__trail">
        <div class="topbar__mode" id="callModeToggle" data-active="-1">
            <span class="topbar__mode-slider" aria-hidden="true"></span>
            <button type="button" class="topbar__mode-btn" aria-label="자동 응대" data-mode="-1">자동응대</button>
            <button type="button" class="topbar__mode-btn" aria-label="바로 연결" data-mode="0">바로연결</button>
        </div>
    </div>
</header>

<main class="page">

    <!-- 앱 설정 (모크업에서는 강제 노출) -->
    <section class="section app-only" id="sectionAppSettings">
        <div class="section__title">앱 설정</div>
        <div class="settings-card">

            <!-- 알림 권한 -->
            <div class="settings-row">
                <div class="settings-row__icon">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"

                    </svg>
                </div>
                <div class="settings-row__info">
                    <div class="settings-row__label">알림 권한</div>
                    <div class="settings-row__desc">상담 알림을 받으려면 허용이 필요해요</div>
                </div>
                <div class="settings-row__right">
                    <button type="button" class="icon-btn" title="알림 설정 열기">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
                                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                  stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 오버레이(서버 팝업) 권한 — Android 전용 -->
            <div class="settings-row android-only" id="rowOverlay">
                <div class="settings-row__icon settings-row__icon--warn" id="overlayIcon">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
                              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="settings-row__info">
                    <div class="settings-row__label">서버 팝업 (오버레이)</div>
                    <div class="settings-row__desc" id="overlayDesc">권한을 허용해야 팝업이 정상 작동해요</div>
                </div>
                <div class="settings-row__right">
                    <span class="dot-badge dot-badge--off" id="overlayBadge">
                        <span class="dot-badge__dot"></span>
                        <span id="overlayBadgeText">꺼짐</span>
                    </span>
                    <button type="button" class="icon-btn" title="오버레이 권한 설정">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
                                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                  stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
            </div>

        </div>
    </section>

    <!-- 내 정보 -->
    <section class="section">
        <div class="section__title">내 정보</div>
        <div class="card">
            <div class="card__body">
                <dl class="kv kv--detail">
                    <div class="kv__row">
                        <dt>이메일</dt>
                        <dd>user@example.com</dd>
                    </div>
                    <div class="kv__row">
                        <dt>휴대폰</dt>
                        <dd>010-1234-5678</dd>
                    </div>
                    <div class="kv__row">
                        <dt>회원 구분</dt>
                        <dd>
                            <span class="badge badge--done">정식 회원</span>
                        </dd>
                    </div>
                </dl>
            </div>
        </div>
    </section>

    <!-- 로그아웃 -->
    <section class="section">
        <button type="button" class="card card--link w-100" style="border: none; text-align: left; cursor: pointer; width:100%;">
            <div class="card__link">
                <div class="card__title" style="color: var(--danger);">로그아웃</div>
            </div>
        </button>
    </section>

    <!-- 회원 탈퇴 -->
    <section class="section text-center" style="margin-top: 24px;">
        <button type="button" class="text-danger-link">회원 탈퇴</button>
    </section>
