<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>콜페이지</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/landing.css">
</head>
<body>

<header class="topbar">
    <div class="topbar__lead">
        <button type="button" class="topbar__btn topbar__btn--back" id="btnBack" aria-label="뒤로가기">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none" aria-hidden="true">
                <path d="M9 1L1 9L9 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <a class="topbar__logo" href="#" aria-label="홈으로">
            <img src="images/callpage-web-logo.png" alt="CallPage">
        </a>
    </div>
    <div class="topbar__title">콜페이지</div>
    <div class="topbar__trail">
        <div class="topbar__mode" id="callModeToggle" data-active="-1">
            <span class="topbar__mode-slider" aria-hidden="true"></span>
            <button type="button" class="topbar__mode-btn" aria-label="자동 응대" data-mode="-1">자동응대</button>
            <button type="button" class="topbar__mode-btn" aria-label="바로 연결" data-mode="0">바로연결</button>
        </div>
    </div>
</header>

<main class="page">

    <!-- 상담 연결 번호 -->
    <section class="section">
        <h2 class="section__title">상담 연결 번호</h2>
        <div class="card">
            <div class="card__body">
                <input class="input" type="text" readonly value="010-5678-1234"
                       style="background:var(--line-light);cursor:default;" />
            </div>
        </div>
    </section>

    <!-- 광고 채널 -->
    <section class="section">
        <h2 class="section__title">광고 채널</h2>
        <div class="ad-channel-list">

            <!-- 채널 1: 네이버 부동산 (광고 URL 있음) -->
            <div class="ad-channel-card card">
                <div class="card__body" style="display:flex;flex-direction:column;gap:12px;">
                    <div class="kv-channel-name">네이버 부동산</div>
                    <div class="ad-url-section">
                        <p class="field__label" style="margin-top:2px;margin-bottom:6px;">광고가 게재된 링크</p>
                        <div class="ad-url-view-row">
                            <div class="ad-url-display">
                                <a class="ad-url-link" href="#">https://land.naver.com/ad/12345</a>
                                <span class="ad-url-empty" style="display:none;">미등록</span>
                            </div>
                            <button type="button" class="btn btn--ghost btn--sm ad-url-edit-btn" style="flex-shrink:0;">수정</button>
                        </div>
                        <div class="ad-url-edit-row" style="display:none;">
                            <input class="input ad-url-input" type="url" value="https://land.naver.com/ad/12345" placeholder="https://" style="font-size:var(--fs-sm);" />
                            <button type="button" class="btn ad-url-save-btn" style="flex-shrink:0;">저장</button>
                        </div>
                    </div>
                    <div>
                        <p class="field__label" style="margin-bottom:6px;">광고에 연결할 URL</p>
                        <div style="margin-bottom:8px;">
                            <button type="button" class="btn btn--ghost" style="width:100%;">새 창에서 열기</button>
                        </div>
                        <div class="url-row">
                            <input class="input callpage-url-input" type="text" readonly
                                   value="https://callpage.co.kr/connect/dHZzXzQ3XzgyXw"
                                   style="font-size:var(--fs-xs);cursor:default;" />
                            <button type="button" class="btn btn--ghost btn-copy-url">복사</button>
                        </div>
                        <div style="margin-top:8px;">
                            <button type="button" class="btn btn--ghost" style="width:100%;">QR코드 만들기</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 채널 2: 인스타그램 (광고 URL 없음) -->
            <div class="ad-channel-card card">
                <div class="card__body" style="display:flex;flex-direction:column;gap:12px;">
                    <div class="kv-channel-name">인스타그램</div>
                    <div class="ad-url-section">
                        <p class="field__label" style="margin-top:2px;margin-bottom:6px;">광고가 게재된 링크</p>
                        <div class="ad-url-view-row">
                            <div class="ad-url-display">
                                <a class="ad-url-link" href="#" style="display:none;"></a>
                                <span class="ad-url-empty">미등록</span>
                            </div>
                            <button type="button" class="btn btn--ghost btn--sm ad-url-edit-btn" style="flex-shrink:0;">수정</button>
                        </div>
                        <div class="ad-url-edit-row" style="display:none;">
                            <input class="input ad-url-input" type="url" placeholder="https://" style="font-size:var(--fs-sm);" />
                            <button type="button" class="btn ad-url-save-btn" style="flex-shrink:0;">저장</button>
                        </div>
                    </div>
                    <div>
                        <p class="field__label" style="margin-bottom:6px;">광고에 연결할 URL</p>
                        <div style="margin-bottom:8px;">
                            <button type="button" class="btn btn--ghost" style="width:100%;">새 창에서 열기</button>
                        </div>
                        <div class="url-row">
                            <input class="input callpage-url-input" type="text" readonly
                                   value="https://callpage.co.kr/connect/dHZzXzQ3XzgzXw"
                                   style="font-size:var(--fs-xs);cursor:default;" />
                            <button type="button" class="btn btn--ghost btn-copy-url">복사</button>
                        </div>
                        <div style="margin-top:8px;">
                            <button type="button" class="btn btn--ghost" style="width:100%;">QR코드 만들기</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 채널 3: 유튜브 (QR 펼쳐진 상태) -->
            <div class="ad-channel-card card">
                <div class="card__body" style="display:flex;flex-direction:column;gap:12px;">
                    <div class="kv-channel-name">유튜브</div>
                    <div class="ad-url-section">
                        <p class="field__label" style="margin-top:2px;margin-bottom:6px;">광고가 게재된 링크</p>
                        <div class="ad-url-view-row">
                            <div class="ad-url-display">
                                <a class="ad-url-link" href="#">https://youtube.com/watch?v=abc123</a>
                                <span class="ad-url-empty" style="display:none;">미등록</span>
                            </div>
                            <button type="button" class="btn btn--ghost btn--sm ad-url-edit-btn" style="flex-shrink:0;">수정</button>
                        </div>
                    </div>
                    <div>
                        <p class="field__label" style="margin-bottom:6px;">광고에 연결할 URL</p>
                        <div style="margin-bottom:8px;">
                            <button type="button" class="btn btn--ghost" style="width:100%;">새 창에서 열기</button>
                        </div>
                        <div class="url-row">
                            <input class="input callpage-url-input" type="text" readonly
                                   value="https://callpage.co.kr/connect/dHZzXzQ3Xzg0Xw"
                                   style="font-size:var(--fs-xs);cursor:default;" />
                            <button type="button" class="btn btn--ghost btn-copy-url">복사</button>
                        </div>
                        <div style="margin-top:8px;">
                            <button type="button" class="btn btn--ghost" style="width:100%;">QR코드 다시 만들기</button>
                        </div>
                        <div class="qr-area" style="display:flex;flex-direction:column;align-items:center;gap:12px;padding-top:12px;">
                            <img class="qr-image"
                                 src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=10&data=https://callpage.co.kr/connect/dHZzXzQ3Xzg0Xw"
                                 alt="QR코드"
                                 style="width:200px;height:200px;border:1px solid var(--line-light);border-radius:8px;" />
                            <button type="button" class="btn" style="width:100%;">QR 저장하기</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- 수정 / 삭제 -->
    <section class="section" style="display:flex;gap:10px;">
        <a href="06-callpage-create.html" class="btn btn--outline"
           style="flex:1;display:inline-flex;align-items:center;justify-content:center;background:var(--card);">
            수정
        </a>
        <button type="button" class="btn" style="flex:1;background:var(--danger);">
            삭제
        </button>
    </section>

</main>

<script src="js/ui.js"></script>
<script src="js/common.js"></script>
<div style="text-align:center;padding:8px;font-size:11px;color:#aaa;margin-top:20px;">
    <a href="00-index.html">← 목차</a> | 07 콜페이지 상세
</div>
</body>
</html>
