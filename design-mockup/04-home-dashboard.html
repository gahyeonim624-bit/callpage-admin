<header class="topbar">
    <div class="topbar__lead">
        <button type="button" class="topbar__btn topbar__btn--back" id="btnBack" aria-label="뒤로가기">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none" aria-hidden="true">
                <path d="M9 1L1 9L9 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <a class="topbar__logo" href="#" aria-label="홈으로">
            <img src="images/callpage-web-logo.png" alt="CallPage">
        </a>
    </div>
    <div class="topbar__title">홈</div>
    <div class="topbar__trail">
        <div class="topbar__mode" id="callModeToggle" data-active="-1">
            <span class="topbar__mode-slider" aria-hidden="true"></span>
            <button type="button" class="topbar__mode-btn" aria-label="자동 응대" data-mode="-1">자동응대</button>
            <button type="button" class="topbar__mode-btn" aria-label="바로 연결" data-mode="0">바로연결</button>
        </div>
    </div>
</header>

<main class="page">

    <section class="hero">
        <img class="hero__logo" src="images/callpage-web-logo.png" alt="callpage" />
        <p class="hero__tagline">이탈없는 상담 연결</p>
    </section>

    <!-- 전화 응대 모드 -->
    <section class="section">
        <p class="mode-label">전화 응대 방식을 선택해 주세요.</p>
        <div class="mode-btns">

            <button type="button" class="mode-btn mode-btn--active" data-mode="-1">
                <span class="mode-btn__icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 3a9 9 0 00-9 9v3a3 3 0 003 3h1v-6H6v-1a6 6 0 0112 0v1h-1v6h1a3 3 0 003-3v-3a9 9 0 00-9-9z"
                              stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                        <path d="M9 18c0 1.657 1.343 3 3 3s3-1.343 3-3"
                              stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </span>
                <span class="mode-btn__text">
                    <span class="mode-btn__title">자동 응대하기</span>
                    <span class="mode-btn__desc">자동으로 상담 신청을 받습니다.</span>
                </span>
            </button>

            <button type="button" class="mode-btn" data-mode="0">
                <span class="mode-btn__icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M5 4h4l2 5-2.5 1.5a11 11 0 005 5L15 13l5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"
                              stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    </svg>
                </span>
                <span class="mode-btn__text">
                    <span class="mode-btn__title">바로 연결하기</span>
                    <span class="mode-btn__desc">모바일로 바로 연결합니다.</span>
                </span>
            </button>

        </div>
    </section>

    <!-- 상담 요약 -->
    <section class="section">
        <div class="stat-grid">
            <a class="stat-card stat-card--missed" href="08-consult-list.html">
                <span class="stat-card__icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M5 4h4l2 5-2.5 1.5a11 11 0 005 5L15 13l5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"
                              stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                        <path d="M15 6l6 6M21 6l-6 6"
                              stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </span>
                <span class="stat-card__label">부재중 상담</span>
                <span class="stat-card__value">
                    <span class="stat-card__count">3</span>
                    <span class="stat-card__unit">건</span>
                </span>
            </a>

            <a class="stat-card stat-card--incomplete" href="08-consult-list.html">
                <span class="stat-card__icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.8"
                              stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                <span class="stat-card__label">미완료 상담</span>
                <span class="stat-card__value">
                    <span class="stat-card__count">7</span>
                    <span class="stat-card__unit">건</span>
                </span>
            </a>
        </div>
    </section>

</main>
