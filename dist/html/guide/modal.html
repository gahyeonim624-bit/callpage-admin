<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <!-- library css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

    <style>
      body {
        padding: 30px;
      }

      .modal {
        display: block !important;
        position: static !important;
        opacity: 1 !important;
        margin-top: 0.5rem;
      }

      .modal-dialog {
        margin-bottom: 0.5rem;
        transform: none !important;
      }

  <body>
    <!-- 용량 설정 -->
    <div class="modal fade" id="modal-modelcapacity" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="staticBackdropLabel">용량 선택</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="row gx-2 gy-2 mb-2">
              <div class="col-auto">
                <input type="checkbox" class="btn-check" id="btncheck10" autocomplete="off" />
                <label class="btn btn-gray4 btn-sm" for="btncheck10">16G</label>
              </div>
              <div class="col-auto">
                <input type="checkbox" class="btn-check" id="btncheck10" autocomplete="off" />
                <label class="btn btn-gray4 btn-sm" for="btncheck10">32G</label>
              </div>
              <div class="col-auto">
                <input type="checkbox" class="btn-check" id="btncheck10" autocomplete="off" />
                <label class="btn btn-gray4 btn-sm" for="btncheck10">64G</label>
              </div>
              <div class="col-auto">
                <input type="checkbox" class="btn-check" id="btncheck10" autocomplete="off" />
                <label class="btn btn-gray4 btn-sm" for="btncheck10">128G</label>
              </div>
              <div class="col-auto">
                <input type="checkbox" class="btn-check" id="btncheck11" autocomplete="off" />
                <label class="btn btn-gray4 btn-sm" for="btncheck11">256G</label>
              </div>
              <div class="col-auto">
                <input type="checkbox" class="btn-check" id="btncheck12" autocomplete="off" />
                <label class="btn btn-gray4 btn-sm" for="btncheck12">512G</label>
              </div>
              <div class="col-auto">
                <input type="checkbox" class="btn-check" id="btncheck13" autocomplete="off" />
                <label class="btn btn-gray4 btn-sm" for="btncheck13">1TB</label>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-lg btn-outline-dark" data-bs-dismiss="modal">취소</button>
            <button type="button" class="btn btn-lg btn-dark">확인</button>
          </div>
        </div>
      </div>
    </div>
