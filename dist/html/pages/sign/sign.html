<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="x-ua-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover" />
    <title>callpage-admin</title>
    <meta name="format-detection" content="telephone=no" />

    <!-- <link rel="icon" type="image/png" href="../../../assets/images/favicon.ico" sizes="32x32" /> -->

    <!-- library css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <!-- library js -->
    <script src="../../../assets/lib/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- publishing css -->
    <link rel="stylesheet" href="../../../assets/css/bootstrap.css" />
    <link rel="stylesheet" href="../../../assets/css/style.css" />

    <!-- publishing js -->
    <script src="../../../assets/js/common.js" defer></script>
  </head>

  <body class="page-sign">
    <div class="layout sign-layout">
      <header class="layout-header">
        <nav class="navbar navbar-sub" id="navbarHeader">
          <a class="navbar-back" href="../../../html/pages/login/login.html">
            <i class="icon-arrow-left"></i>
          </a>
        </nav>
      </header>
      <main class="layout-main">
        <section class="sign">
          <h2 class="sign-title">회원가입</h2>
          <p class="sign-desc">이메일 인증 후 전화 한 통으로 가입이 완료됩니다.</p>

          <div class="sign-card">
            <label class="create-field-label">이메일</label>
            <div class="create-field">
              <input type="email" class="create-input" placeholder="example@email.com" />
            </div>
            <p class="sign-caption">입력하신 이메일로 인증 링크를 보내드려요.</p>

            <hr class="sign-divider" />

            <label class="checkbox agree-all">
              <input type="checkbox" checked />
              <span class="checkbox-box"><i class="icon-check"></i></span>
              <span class="checkbox-label">전체 동의</span>
            </label>

            <div class="agree-row">
              <label class="checkbox">
                <input type="checkbox" checked />
                <span class="checkbox-box"><i class="icon-check"></i></span>
                <span class="checkbox-label">(필수) 이용약관 동의</span>
              </label>
              <a href="#" class="agree-view">보기</a>
            </div>

            <div class="agree-row">
              <label class="checkbox">
                <input type="checkbox" checked />
                <span class="checkbox-box"><i class="icon-check"></i></span>
                <span class="checkbox-label">(필수)개인정보 처리방침 동의</span>
              </label>
              <a href="#" class="agree-view">보기</a>
            </div>

            <div class="agree-row">
              <label class="checkbox">
                <input type="checkbox" />
                <span class="checkbox-box"><i class="icon-check"></i></span>
                <span class="checkbox-label">(선택) 마케팅 정보 수신 동의</span>
              </label>
              <a href="#" class="agree-view">보기</a>
            </div>
          </div>
          <div class="sign-footer">
            <button type="button" class="sign-submit-btn">이메일 인증하기</button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
