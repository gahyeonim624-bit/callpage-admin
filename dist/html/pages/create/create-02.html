<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="x-ua-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover" />
    <title>call2b-admin</title>
    <meta name="format-detection" content="telephone=no" />

    <!-- <link rel="icon" type="image/png" href="../../../assets/images/favicon.ico" sizes="32x32" /> -->

    <!-- library css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <!-- library js -->
    <script src="../../../assets/lib/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- publishing css -->
    <link rel="stylesheet" href="../../../assets/css/bootstrap.css" />
    <link rel="stylesheet" href="../../../assets/css/style.css" />

    <!-- publishing js -->
    <script src="../../../assets/js/common.js" defer></script>
  </head>

  <body class="page-create" data-nav-active="call">
    <div class="layout layout-app">
      <header class="layout-header">
        <nav class="navbar navbar-sub" id="navbarHeader">
          <div class="navbar-left">
            <a class="navbar-back" href="../../../html/pages/home/dashboard.html">
              <i class="icon-arrow-left"></i>
            </a>
            <h1 class="navbar-title">콜투비 만들기</h1>
          </div>
          <div class="header-toggle" role="tablist">
            <button type="button" class="header-toggle-btn active" role="tab" aria-selected="true">자동응대</button>
            <button type="button" class="header-toggle-btn" role="tab" aria-selected="false">바로연결</button>
          </div>
        </nav>
      </header>
      <main class="layout-main">
        <section class="create">
          <ol class="step-progress">
            <li class="step-progress-item done">
              <span class="step-progress-circle"><i class="icon-check-active"></i></span>
              <span class="step-progress-label">이름 정하기</span>
            </li>
            <li class="step-progress-line"></li>
            <li class="step-progress-item active">
              <span class="step-progress-circle"><i class="icon-check-active"></i></span>
              <span class="step-progress-label">페이지 구성</span>
            </li>
            <li class="step-progress-line"></li>
            <li class="step-progress-item">
              <span class="step-progress-circle"><i class="icon-check"></i></span>
              <span class="step-progress-label">광고 정보 등록</span>
            </li>
          </ol>
          <p class="create-step">STEP 2/3</p>
          <h2 class="create-title">페이지 구성</h2>
          <p class="create-desc">고객에게 보여줄 안내 내용과 이미지를 등록하고,<br />필요한 경우 사전 질문을 추가해 주세요.</p>
          <div class="create-field-wrap">
            <div class="create-field-group">
              <label class="create-field-label">제목</label>
              <div class="create-field">
                <textarea class="create-input" rows="1" placeholder="제목을 입력해주세요. (선택)" maxlength="30"></textarea>
                <span class="create-counter"><span class="create-counter-current">0 </span>/ 30</span>
              </div>
            </div>
            <div class="create-field-group">
              <label class="create-field-label">안내 내용</label>
              <div class="create-field">
                <textarea class="create-input" rows="3" placeholder="안내 내용을 입력해주세요. (선택)" maxlength="90"></textarea>
                <span class="create-counter"><span class="create-counter-current">0 </span>/ 90</span>
              </div>
            </div>
          </div>
          <div class="create-field-wrap mt-2">
            <button type="button" class="create-add-btn">
              <i class="icon-plus"></i>
              이미지 추가
            </button>
          </div>
          <div class="create-field-wrap preq-card mt-2" id="preqCard">
            <div class="preq-list" id="preqList"></div>
            <button type="button" class="create-add-btn" id="preqAddBtn">
              <i class="icon-plus"></i>
              사전 질문 추가
            </button>
            <p class="preq-caption">개인정보 및 민감정보를 포함 한 질문은 등록할 수 없습니다.</p>
          </div>

          <template id="preqItemTemplate">
            <div class="preq-item">
              <div class="preq-header">
                <h3 class="preq-title">사전 질문 <span class="preq-index">1</span></h3>
                <button type="button" class="preq-remove" aria-label="질문 삭제">
                  <i class="icon-x"></i>
                </button>
              </div>
              <p class="preq-desc">상담을 위해 필요한 정보를 미리 질문해 보세요.</p>
              <div class="create-field-group">
                <label class="create-field-label">질문</label>
                <div class="create-field">
                  <input type="text" class="create-input" placeholder="질문을 입력해주세요." />
                </div>
              </div>
              <div class="create-field-group">
                <label class="create-field-label">질문유형</label>
                <div class="preq-type-toggle" role="tablist">
                  <button type="button" class="preq-type-btn active" data-type="text"><i class="icon-type-text"></i>텍스트</button>
                  <button type="button" class="preq-type-btn" data-type="checkbox"><i class="icon-type-checkbox"></i>체크박스</button>
                  <button type="button" class="preq-type-btn" data-type="select"><i class="icon-type-select"></i>드롭다운</button>
                </div>
              </div>
              <div class="create-field-group preq-answer-example m-0">
                <label class="create-field-label">답변 예시</label>
                <div class="create-field">
                  <input type="text" class="create-input" placeholder="예) 노안교정술, 백내장" />
                </div>
              </div>
              <div class="create-field-group preq-options" hidden>
                <div class="preq-options-header">
                  <label class="create-field-label">옵션 설정</label>
                  <button type="button" class="preq-option-add"><i class="icon-plus"></i>옵션 추가</button>
                </div>
                <div class="preq-option-list"></div>
              </div>
            </div>
          </template>

          <template id="preqOptionTemplate">
            <div class="preq-option-row">
              <i class="preq-option-drag"></i>
              <input type="text" class="preq-option-input" placeholder="옵션을 입력해주세요." />
              <button type="button" class="preq-option-remove" aria-label="옵션 삭제">
                <i class="icon-trash"></i>
              </button>
            </div>
          </template>

          <div class="create-buttons">
            <button type="button" class="btn btn-lg create-btn-preview">
              <i class="icon-search-plus"></i>
              미리보기
            </button>
            <button type="button" class="btn btn-lg create-btn-next">다음</button>
          </div>
        </section>
      </main>
      <footer class="layout-nav-wrap">
        <nav class="layout-nav" id="layoutNav">
          <a class="layout-nav-item" data-nav="home" href="../../../html/pages/home/dashboard.html">
            <i class="nav-home"></i>
            <span>홈</span>
          </a>
          <a class="layout-nav-item" data-nav="call" href="#">
            <i class="nav-call"></i>
            <span>콜투비</span>
          </a>
          <a class="layout-nav-item" data-nav="advice" href="../../../html/pages/consultation/consultation.html">
            <i class="nav-advice"></i>
            <span>상담</span>
          </a>
          <a class="layout-nav-item" data-nav="analysis" href="../../../html/pages/analysis/analysis.html">
            <i class="nav-analysis"></i>
            <span>분석</span>
          </a>
          <a class="layout-nav-item" data-nav="management" href="../../../html/pages/mypage/mypage.html">
            <i class="nav-management"></i>
            <span>관리</span>
          </a>
        </nav>
      </footer>
    </div>
  </body>
</html>
