      body {
        background-color: #fff;
        padding: 20px;
        position: relative;
        height: auto;

        overflow: auto !important;

      h1 {

      table {
        width: 100%;

        border-collapse: collapse;
        margin: 0 auto;

      table th,
      table td {
        border: 1px solid #a7c7c7;
        padding: 1px 10px;
        word-break: keep-all;
      }

      table th {
        background: #005151;
        color: #fff;
        padding: 10px;
        font-size: 14px;
      }

      table td a {
        color: #005151;
        text-decoration: none;
      }

      table td a:hover {

      }

      table tbody tr {

      }

      }

      .noteTable {

      }

      .noteTable .date {

      .center {

      }

      .bg {
        background: #fff5f5;
      }

      ul.float {
        position: absolute;
        right: 20px;
        top: 20px;
      }

      ul.float li {
        list-style: none;
        border: 1px solid #ccc;
        padding: 2px 5px;
        display: inline-block;
      }

      .end {
        background: #ffffcc;
      }

      .ing {
        background: #f6b1a6;
      }

      .list {
        text-align: center;
        padding: 0 0 20px;
      }

      .list a {
        text-decoration: none;
        margin: 0 10px;
      }

      .list a:hover {
        text-decoration: underline;
      }

      .box {
        border: 2px dotted #aaa;
        padding: 1rem;
        margin-bottom: 1rem;
        text-align: center;
        line-height: 1.6;
      }

      .box > ul {
        display: inline-block;
        text-align-last: left;
